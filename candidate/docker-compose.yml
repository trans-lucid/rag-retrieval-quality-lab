services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: raglab
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d raglab"]
      interval: 2s
      timeout: 3s
      retries: 30

  qdrant:
    image: qdrant/qdrant:v1.9.5
    ports:
      - "6333:6333"

  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"

  fake-embedding-api:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./simulators:/app
    command: sh -c "pip install --no-cache-dir fastapi uvicorn >/tmp/fake-embedding-install.log 2>&1 && uvicorn fake_embedding_api:app --host 0.0.0.0 --port 8088"
    ports:
      - "8088:8088"
